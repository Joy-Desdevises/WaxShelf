<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect SPA routes to index.html preserving the path
      var path = window.location.pathname.replace(/^\/WaxShelf/, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace('/WaxShelf/');
    </script>
  </head>
  <body></body>
</html>
